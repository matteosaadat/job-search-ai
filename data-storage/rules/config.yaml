    contract: 1.0
    fractional: 1.0     # fractional = contract relationship
    part-time: 0.8      # employed part-time
    full-time: 0.8      # employed full-time
  schedule_multipliers:
    3: 1.0              # 3 days/week — ideal
    4: 0.9
    5: 0.8              # 5 days/week — acceptable
  implied_schedule_days:
    full-time: 5
    part-time: 3
    fractional: 3
